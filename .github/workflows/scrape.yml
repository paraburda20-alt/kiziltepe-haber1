name: Kiziltepe Haber Tarayici ve Bildirim

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to commit and push db.json back to repo

    steps:
      - name: Depoyu Klonla (Checkout)
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Kok Dizin Bagimliliklarini Yukle
        run: |
          npm install

      - name: Taramayi Calistir (Scrape & Notify)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node github_scrape.js

      - name: Guncellenmis db.json Kaydet (Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update news database [skip ci]" && git push)
