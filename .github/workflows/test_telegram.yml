name: Telegram Baglanti Testi

on:
  workflow_dispatch:
    # Allows manual trigger to test Telegram connection

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to commit and push db.json back to repo

    steps:
      - name: Depoyu Klonla (Checkout)
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bagimliliklari Yukle
        run: |
          npm install

      - name: Test Mesajini Gonder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node test_telegram.js

      - name: Guncellenmis db.json Kaydet (Commit & Push)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: log Telegram test result [skip ci]" && git push)

